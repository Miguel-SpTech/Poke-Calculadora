<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon binary Machine</title>
    <link rel="stylesheet" href="style.css">
</head>

<body bgcolor="#000000">
    <center>
        <div class="divprinc">
            <h1 class="colorred">Pokémon Binary Machine</h1>
            <span class="colorred">veja qual é o pokemon equivalente ao seu numero</span>
            <br><span class="colorred">pokemon disponiveis atualmente: 1-6</span>
        </div>
        <div class="divprinc">
            <h3 class="colorred">Digite um número decimal:</h3>
            <input id="demo1" type="text" placeholder="Ex: 42" oninput="converter()">
        </div><br><br>
        <div class="divprinc colorwhite">
            <h3>Resultados:</h3>
            <p>Octal:
            <div id="demo2" ></div>
            </p>
            <p>Hexadecimal:
            <div id="demo3" ></div>
            </p>
            <p>Binário:
            <div id="demo4" ></div>
            </p>
        </div>
        <div id="div_desc" class="colorwhite"></div>
        <div id="div_img"></div> 
    </center>

    <script>
        function converter() {
            var decimal = Number(demo1.value);
            let octal = decimal.toString(8);
            let hexadecimal = decimal.toString(16);
            let binary = decimal.toString(2);

            demo2.innerHTML = octal;
            demo3.innerHTML = hexadecimal;
            demo4.innerHTML = binary;

            if (decimal==1){
                div_desc.innerHTML = "Bulbasaur nº " + decimal + "₁₀/ " + octal + "₈/ "+ hexadecimal +"₁₆/ "+ binary +"₂<br>"
                div_img.innerHTML = '<img src="P1.gif" alt="">'
            } else if (decimal == 2) {
                div_desc.innerHTML = "Ivysaur nº " + decimal + "₁₀/ " + octal + "₈/ "+ hexadecimal +"₁₆/ "+ binary +"₂<br>"
                div_img.innerHTML = '<img src="P2.gif" alt="">'
            } else if (decimal == 3) {
                div_desc.innerHTML = "Venasaur nº " + decimal + "₁₀/ " + octal + "₈/ "+ hexadecimal +"₁₆/ "+ binary +"₂<br>"
                div_img.innerHTML = '<img src="P3.gif" alt="">'
            } else if (decimal == 4) {
                div_desc.innerHTML = "Charmander nº " + decimal + "₁₀/ " + octal + "₈/ "+ hexadecimal +"₁₆/ "+ binary +"₂<br>"
                div_img.innerHTML = '<img src="P4.gif" alt="">'
            } else if (decimal == 5) {
                div_desc.innerHTML = "Charmelion nº " + decimal + "₁₀/ " + octal + "₈/ "+ hexadecimal +"₁₆/ "+ binary +"₂<br>"
                div_img.innerHTML = '<img src="P5.gif" alt="">'
            } else if (decimal == 6) {
                div_desc.innerHTML = "Charizard nº " + decimal + "₁₀/ " + octal + "₈/ "+ hexadecimal +"₁₆/ "+ binary +"₂<br>"
                div_img.innerHTML = '<img src="P6.gif" alt="">'
            }
        }
    </script>
</body>

</html>
